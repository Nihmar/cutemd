name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
      - run: uv sync --dev
      - name: Download appimagetool
        run: |
          wget -q -O /tmp/appimagetool \
            https://github.com/AppImage/appimagetool/releases/latest/download/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          echo "/tmp" >> "$GITHUB_PATH"
      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: bash scripts/build_appimage.sh
      - uses: actions/upload-artifact@v7
        with:
          name: cutemd-linux
          path: dist/cutemd-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
      - run: uv sync --dev
      - name: Install Inno Setup
        run: choco install innosetup --no-progress
      - name: Build .exe + installer
        shell: bash
        run: bash scripts/build_windows.sh
      - uses: actions/upload-artifact@v7
        with:
          name: cutemd-windows
          path: |
            dist/cutemd/cutemd.exe
            dist/CuteMD_Setup.exe

  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
      - run: uv sync --dev
      - name: Build .deb
        run: bash scripts/build_deb.sh
      - uses: actions/upload-artifact@v7
        with:
          name: cutemd-deb
          path: dist/cutemd_*.deb

  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
      - run: uv sync --dev
      - name: Install rpm-build
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rpm
      - name: Build .rpm
        run: bash scripts/build_rpm.sh
      - uses: actions/upload-artifact@v7
        with:
          name: cutemd-rpm
          path: dist/cutemd-*.rpm

  release:
    needs: [build-linux, build-windows, build-deb, build-rpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            cutemd-linux/cutemd-x86_64.AppImage
            cutemd-windows/cutemd.exe
            cutemd-windows/CuteMD_Setup.exe
            cutemd-deb/cutemd_*.deb
            cutemd-rpm/cutemd-*.rpm
